<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="description" content="A small set of doors." />
    <meta name="color-scheme" content="dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ---------- tokens ---------- */
      :root {
        --bg: #0b0b0c;
        --ink: #e8e6e2;
        --muted: #7a7670;
        --line: rgba(232, 230, 226, 0.1);
        --line-2: rgba(232, 230, 226, 0.04);
        --accent: #c9a36a;
        --tile-bg: rgba(11, 11, 12, 0.65);
        --tile-bg-h: rgba(232, 230, 226, 0.04);

        --sans: "Inter", system-ui, -apple-system, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
      }

      /* ---------- reset-ish ---------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      html {
        background: var(--bg);
      }
      body {
        min-height: 100vh;
        color: var(--ink);
        font-family: var(--sans);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      /* ---------- background ---------- */
      .bg,
      .tint {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg {
        background-image: url("lab.jpg");
        background-size: cover;
        background-position: center;
        filter: grayscale(1) brightness(0.55) contrast(1.05);
      }
      .tint {
        background: radial-gradient(
          ellipse at 50% 50%,
          rgba(11, 11, 12, 0.3) 0%,
          rgba(11, 11, 12, 0.8) 85%
        );
      }

      /* ---------- layout ---------- */
      .frame {
        position: relative;
        z-index: 1;
        max-width: 1040px;
        margin: 0 auto;
        padding: clamp(48px, 8vh, 96px) clamp(20px, 4vw, 56px) 40px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header.top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: clamp(40px, 7vh, 80px);
      }
      .brand {
        font-family: var(--mono);
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink);
      }
      .tagline {
        font-style: italic;
        color: var(--muted);
        font-size: 13px;
      }

      /* ---------- grid ---------- */
      .grid-wrap {
        flex: 1;
        display: flex;
        align-items: center;
      }
      .grid {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
      }

      .tile {
        background: var(--tile-bg);
        padding: 24px 22px 22px;
        min-height: 138px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        border: 1px solid transparent;
        transition:
          background 180ms ease,
          border-color 180ms ease,
          transform 180ms ease;
        position: relative;
        isolation: isolate;
      }
      .tile:hover,
      .tile:focus-visible {
        background: var(--tile-bg-h);
        border-color: rgba(201, 163, 106, 0.45);
        outline: none;
      }
      .tile:focus-visible {
        box-shadow: 0 0 0 1px rgba(201, 163, 106, 0.45) inset;
      }

      .tile-num {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        transition: color 180ms ease;
        letter-spacing: 0.04em;
      }
      .tile:hover .tile-num {
        color: var(--accent);
      }

      .tile-icon {
        margin-top: 4px;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        transition: color 180ms ease;
      }
      .tile:hover .tile-icon {
        color: var(--ink);
      }
      .tile-icon svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      /* if a tile has no icon, the slot collapses gracefully */
      .tile-icon:empty {
        display: none;
      }

      .tile-label {
        font-size: 17px;
        font-weight: 400;
        margin-top: auto;
        color: var(--ink);
      }
      .tile-host {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }

      /* ---------- footer ---------- */
      footer.bot {
        margin-top: clamp(32px, 6vh, 56px);
        display: flex;
        justify-content: center;
        gap: 12px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }
      footer.bot a:hover {
        color: var(--ink);
      }

      /* ---------- responsive ---------- */
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
        header.top {
          flex-direction: column;
          gap: 6px;
          align-items: flex-start;
        }
      }
      @media (max-width: 480px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .tile {
          min-height: 92px;
          padding: 18px 18px 16px;
        }
        .tile-label {
          font-size: 16px;
        }
      }

      /* ---------- print / reduced-motion ---------- */
      @media (prefers-reduced-motion: reduce) {
        .tile,
        .tile-num,
        .tile-icon {
          transition: none;
        }
      }

      /* ---------- selection ---------- */
      ::selection {
        background: var(--accent);
        color: var(--bg);
      }
    </style>
  </head>
